<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Save to OrbStation</title>
  <style>
    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0a0a0a;
      color: #fff;
      margin: 0;
      padding: 16px;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #a78bfa;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 12px;
      color: #a1a1aa;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #1f1f22;
      border: 1px solid #3f3f46;
      color: white;
      padding: 8px;
      border-radius: 6px;
      margin-top: 4px;
    }
    button {
      width: 100%;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      margin-top: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #6d28d9;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>OrbStation</h2>
  <label>Title</label>
  <input type="text" id="beacon-title" />
  
  <label>URL</label>
  <input type="text" id="beacon-url" readonly />

  <label>Sector</label>
  <select id="sector-select" style="width: 100%; box-sizing: border-box; background: #1f1f22; border: 1px solid #3f3f46; color: white; padding: 8px; border-radius: 6px; margin-top: 4px;">
    <option value="">Loading sectors...</option>
  </select>
  
  <button id="save-btn">Save Beacon</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
